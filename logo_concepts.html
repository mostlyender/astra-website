<!DOCTYPE html>
<html>
<head><title>Rova Labs Logo Concepts</title>
<style>
body { font-family: Inter, sans-serif; background: #f5f5f5; padding: 40px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; max-width: 900px; margin: 0 auto; }
.card { background: #fff; border-radius: 12px; padding: 32px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card.dark { background: #0F2B5B; }
h1 { text-align: center; color: #0F2B5B; margin-bottom: 32px; }
p { text-align: center; color: #666; margin-bottom: 40px; }
.label { font-size: 12px; color: #999; margin-top: 12px; }
</style>
</head>
<body>
<h1>Rova Labs — Logo Concepts</h1>
<p>6 directions for review. All SVG, scalable, print-ready.</p>
<div class="grid">

<!-- Concept 1: Clean Geometric R -->
<div class="card">
<svg width="120" height="120" viewBox="0 0 120 120">
<rect x="10" y="10" width="100" height="100" rx="16" fill="#0F2B5B"/>
<text x="60" y="78" text-anchor="middle" font-family="Inter,sans-serif" font-size="56" font-weight="700" fill="#fff">RL</text>
</svg>
<div class="label">1. Monogram — Clean Square</div>
</div>

<!-- Concept 2: Circuit/Node -->
<div class="card">
<svg width="120" height="120" viewBox="0 0 120 120">
<circle cx="60" cy="60" r="8" fill="#0F2B5B"/>
<circle cx="30" cy="35" r="5" fill="#1B5E8A"/>
<circle cx="90" cy="35" r="5" fill="#1B5E8A"/>
<circle cx="30" cy="85" r="5" fill="#1B5E8A"/>
<circle cx="90" cy="85" r="5" fill="#1B5E8A"/>
<line x1="60" y1="60" x2="30" y2="35" stroke="#0F2B5B" stroke-width="2"/>
<line x1="60" y1="60" x2="90" y2="35" stroke="#0F2B5B" stroke-width="2"/>
<line x1="60" y1="60" x2="30" y2="85" stroke="#0F2B5B" stroke-width="2"/>
<line x1="60" y1="60" x2="90" y2="85" stroke="#0F2B5B" stroke-width="2"/>
<text x="60" y="115" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#0F2B5B">ROVA LABS</text>
</svg>
<div class="label">2. Network Node — AI Operating Layer</div>
</div>

<!-- Concept 3: Stacked Layers -->
<div class="card">
<svg width="120" height="120" viewBox="0 0 120 120">
<path d="M60 20 L100 40 L60 60 L20 40 Z" fill="#0F2B5B" opacity="0.3"/>
<path d="M60 35 L100 55 L60 75 L20 55 Z" fill="#0F2B5B" opacity="0.6"/>
<path d="M60 50 L100 70 L60 90 L20 70 Z" fill="#0F2B5B"/>
<text x="60" y="112" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#0F2B5B">ROVA LABS</text>
</svg>
<div class="label">3. Stacked Layers — Operating Layer</div>
</div>

<!-- Concept 4: Bold Wordmark -->
<div class="card">
<svg width="200" height="60" viewBox="0 0 200 60">
<text x="0" y="42" font-family="Inter,sans-serif" font-size="38" font-weight="800" fill="#0F2B5B" letter-spacing="-2">ROVA</text>
<text x="118" y="42" font-family="Inter,sans-serif" font-size="38" font-weight="300" fill="#1B5E8A" letter-spacing="-1">LABS</text>
</svg>
<div class="label">4. Bold Wordmark — Weight Contrast</div>
</div>

<!-- Concept 5: Shield -->
<div class="card">
<svg width="120" height="120" viewBox="0 0 120 120">
<path d="M60 10 L100 30 L100 65 Q100 95 60 110 Q20 95 20 65 L20 30 Z" fill="#0F2B5B"/>
<text x="60" y="68" text-anchor="middle" font-family="Inter,sans-serif" font-size="28" font-weight="700" fill="#fff">RL</text>
<text x="60" y="84" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="400" fill="rgba(255,255,255,0.7)" letter-spacing="3">SECURE</text>
</svg>
<div class="label">5. Shield — Security-First</div>
</div>

<!-- Concept 6: Hexagon -->
<div class="card">
<svg width="120" height="120" viewBox="0 0 120 120">
<polygon points="60,10 105,35 105,85 60,110 15,85 15,35" fill="#0F2B5B"/>
<text x="60" y="68" text-anchor="middle" font-family="Inter,sans-serif" font-size="26" font-weight="700" fill="#fff">RL</text>
</svg>
<div class="label">6. Hexagon — Technical / Engineering</div>
</div>

</div>
</body>
</html>
